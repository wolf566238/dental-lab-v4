<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر الأسنان السحري</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="header-top">
                <img src="logo.png" class="logo" alt="Logo" onerror="this.style.display='none'">
                <div class="controls">
                    <button type="button" id="langBtn" onclick="toggleLang()">EN</button>
                    <button type="button" id="themeBtn" onclick="toggleTheme()">🌙</button>
                </div>
            </div>
            <h1 id="title">مختبر الأسنان السحري</h1>
            <p id="subtitle">أدخل تفاصيل الطلب لإرسالها للمختبر مباشرة</p>
        </header>

        <form id="orderForm">
            <div class="form-group"><input type="text" id="name" placeholder="الاسم الكامل" required></div>
            <div class="form-group"><input type="email" id="email" placeholder="البريد الإلكتروني" required></div>
            <div class="form-group"><input type="tel" id="phone" placeholder="رقم الهاتف" required></div>
            <div class="form-group"><input type="text" id="doctor" placeholder="اسم الطبيب ورقم العيادة" required></div>
            <div class="form-group"><input type="text" id="patient" placeholder="اسم المريض"></div>

            <div class="form-row">
                <div class="form-group">
                    <label for="type" id="lblType">نوع العمل</label>
                    <select id="type">
                        <option value="تلبيسة">تلبيسة / Crown</option>
                        <option value="زراعة">زراعة / Implant</option>
                        <option value="تقويم">تقويم / Orthodontics</option>
                        <option value="عدسات">عدسات / Veneers</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="priority" id="lblPriority">الأولوية</label>
                    <select id="priority">
                        <option value="عادي">عادي / Normal</option>
                        <option value="مستعجل">مستعجل / Urgent</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="date" id="lblDate">تاريخ التسليم المطلوب</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <textarea id="notes" rows="3" placeholder="ملاحظات إضافية وتفاصيل اللون..."></textarea>
            </div>

            <div class="form-group file-upload">
                <label for="files" id="lblFiles">📸 إرفاق صور أو ملفات الحالات (اختياري)</label>
                <input type="file" id="files" multiple>
            </div>

            <button type="submit" id="submitBtn">إرسال الطلب للمختبر</button>
        </form>

        <div id="status" class="status-msg"></div>
    </div>

    <script src="translations.js"></script>
    <script src="app.js"></script>
</body>
</html>
